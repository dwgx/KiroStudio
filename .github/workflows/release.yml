# 发布流水线：打 tag v* 或手动触发时，构建前端 + musl 静态二进制并上传到 Release
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # 测试门禁：出厂二进制一律 --no-default-features（纯 rustls）。历史上 cargo test 只跑默认
  # 特性(native-tls)，从未覆盖真正发布的 --no-default-features 构建 = 出厂配置存在测试盲区。
  # 这里在任何产物构建前，先用**出厂特性**跑全量测试；两个 build 任务 needs 它，测试不过不发布。
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust 编译缓存
        uses: Swatinem/rust-cache@v2
        with:
          key: test-no-default
      - name: 运行测试（出厂特性：纯 rustls）
        run: cargo test --no-default-features --locked

  build-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 前端必须在 cargo build 之前产出 admin-ui/dist —— rust-embed 是编译期嵌入
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: admin-ui/pnpm-lock.yaml

      - name: 构建前端 (admin-ui/dist)
        working-directory: admin-ui
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: 安装 Rust (musl 目标)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: 安装 musl 工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Rust 编译缓存
        uses: Swatinem/rust-cache@v2
        with:
          key: musl-release

      # 纯 rustls：--no-default-features 去掉 native-tls(vendored openssl)，走 webpki/native-roots。
      # rustls 的 ring 后端在 musl 通常可编译；若遇 aws-lc-rs 在 musl 报错(缺 cmake/交叉 C 工具链)，
      # 可改用 target=x86_64-unknown-linux-gnu(去掉本步骤 musl-tools 与 --target 的 musl 部分)。
      - name: 构建 release 二进制
        run: cargo build --release --no-default-features --target x86_64-unknown-linux-musl

      - name: 打包产物 + 生成校验和
        run: |
          BIN=target/x86_64-unknown-linux-musl/release/kirostudio
          cp "$BIN" kirostudio-linux-x86_64
          sha256sum kirostudio-linux-x86_64 > kirostudio-linux-x86_64.sha256
          echo "--- 产物 ---"
          ls -la kirostudio-linux-x86_64 kirostudio-linux-x86_64.sha256
          cat kirostudio-linux-x86_64.sha256

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kirostudio-linux-x86_64
            kirostudio-linux-x86_64.sha256

  # Windows 原生 exe：任意 Win10+ x64 双击即跑（crt-static 静态链接 C 运行时，
  # 无 VCRUNTIME140.dll 依赖，见 .cargo/config.toml）。纯 rustls（--no-default-features），
  # 与 Linux 产物一致，避开 Windows 上 vendored OpenSSL 的工具链依赖。
  build-release-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 前端必须在 cargo build 之前产出 admin-ui/dist —— rust-embed 是编译期嵌入
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: admin-ui/pnpm-lock.yaml

      - name: 构建前端 (admin-ui/dist)
        working-directory: admin-ui
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: 安装 Rust (msvc 目标)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust 编译缓存
        uses: Swatinem/rust-cache@v2
        with:
          key: msvc-release

      # 纯 rustls：--no-default-features 去掉 native-tls(vendored openssl，Windows 需 Perl/NASM)。
      # 代码默认配置 tlsBackend=rustls，reqwest 内置 rustls-tls-webpki-roots，自洽。
      # crt-static 由仓库根 .cargo/config.toml 对 windows-msvc 目标自动施加。
      - name: 构建 release 二进制
        run: cargo build --release --no-default-features --target x86_64-pc-windows-msvc

      - name: 打包产物 + 生成校验和
        shell: pwsh
        run: |
          $bin = "target/x86_64-pc-windows-msvc/release/kirostudio.exe"
          Copy-Item $bin kirostudio-windows-x86_64.exe
          $hash = (Get-FileHash kirostudio-windows-x86_64.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  kirostudio-windows-x86_64.exe" | Out-File -Encoding ascii kirostudio-windows-x86_64.exe.sha256
          Write-Host "--- 产物 ---"
          Get-ChildItem kirostudio-windows-x86_64.exe, kirostudio-windows-x86_64.exe.sha256
          Get-Content kirostudio-windows-x86_64.exe.sha256

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kirostudio-windows-x86_64.exe
            kirostudio-windows-x86_64.exe.sha256
